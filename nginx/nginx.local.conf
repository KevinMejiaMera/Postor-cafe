# nginx/nginx.local.conf — Configuración NGINX para entorno LOCAL
# Accesible en: http://localhost:8080
# No tiene SSL ni headers de seguridad estrictos para facilitar el desarrollo.

server {
    listen 80;
    server_name localhost;

    # Tamaño máximo de archivo subido
    client_max_body_size 50M;

    # ─── Archivos estáticos (servidos directamente por Nginx) ───
    location /static/ {
        alias /app/staticfiles/;
        # Sin caché agresivo en local para ver cambios inmediatamente
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── Archivos de media ───────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires -1;
    }

    # ─── Health check de Nginx ───────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── Todo lo demás → Django (runserver) ─────────────────────
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts más largos para debug en local
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Deshabilitar buffering para ver streaming de logs en tiempo real
        proxy_buffering off;
    }
}
