<div class="hostal-overlay" onclick="if(event.target===this) cerrarModal()">
    <div class="hostal-modal" onclick="event.stopPropagation()" style="max-width: 500px; width: 95%;">
        <div class="hostal-modal-header" style="background: var(--secondary-color);">
            <div>
                <h3 style="margin:0; color:white;"><i class="fas fa-edit"></i> Editar Sesión #{{ sesion.id }}</h3>
                <small style="color: rgba(255,255,255,0.7);">Ajuste de valores de cuadre</small>
            </div>
            <button class="hostal-modal-close" onclick="cerrarModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form method="post" action="{% url 'caja:editar_caja_modal' sesion.id %}">
            {% csrf_token %}
            <div class="hostal-modal-body" style="padding: 24px; background: white;">
                <div class="hm-field" style="margin-bottom: 20px;">
                    <label class="hm-label" style="display:block; font-weight:700; margin-bottom: 5px;">Monto Inicial ($)</label>
                    <input type="number" step="0.01" name="monto_inicial" class="hm-input" style="width:100%; padding:10px; border:1px solid var(--bg-cream); border-radius:8px;" value="{{ sesion.monto_inicial|stringformat:'.2f' }}" required>
                </div>
                <div class="hm-field" style="margin-bottom: 20px;">
                    <label class="hm-label" style="display:block; font-weight:700; margin-bottom: 5px;">Ventas Sistema ($)</label>
                    <input type="number" step="0.01" name="monto_final_sistema" class="hm-input" style="width:100%; padding:10px; border:1px solid var(--bg-cream); border-radius:8px;" value="{{ sesion.monto_final_sistema|default:0|stringformat:'.2f' }}">
                    <small style="color: grey; font-size: 0.8rem;">Monto total de ventas registrado.</small>
                </div>
                <div class="hm-field" style="margin-bottom: 20px;">
                    <label class="hm-label" style="display:block; font-weight:700; margin-bottom: 5px;">Dinero Físico ($)</label>
                    <input type="number" step="0.01" name="monto_final_fisico" class="hm-input" style="width:100%; padding:10px; border:1px solid var(--bg-cream); border-radius:8px;" value="{{ sesion.monto_final_fisico|default:0|stringformat:'.2f' }}">
                    <small style="color: grey; font-size: 0.8rem;">Monto real contado.</small>
                </div>
                
                <div class="info-note" style="margin-top: 15px; background: #f0f9ff; color: #0369a1; padding: 10px; border-radius: 8px; font-size: 0.85rem; border: 1px solid #bae6fd;">
                    <i class="fas fa-info-circle"></i> Al guardar, se recalculará automáticamente la diferencia basada en los gastos vinculados.
                </div>
            </div>

            <div class="hostal-modal-footer" style="padding: 20px; border-top: 1px solid var(--bg-cream); display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn-hm-cancel" onclick="cerrarModal()" style="padding: 10px 20px; border: 1px solid var(--bg-cream); border-radius: 8px; background: white; cursor: pointer;">Cancelar</button>
                <button type="submit" class="btn-hm-save" style="padding: 10px 20px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700;">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
