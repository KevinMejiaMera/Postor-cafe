<div class="hostal-overlay" onclick="if(event.target===this) cerrarHostalModal()">
    <div class="hostal-modal" onclick="event.stopPropagation()" style="max-width: 700px; width: 95%;">
        <div class="hostal-modal-header" style="background: #3b82f6;">
            <div>
                <h3><i class="fas fa-edit"></i> Editar Reserva #{{ reserva.id }}</h3>
                <small style="color: rgba(255,255,255,0.85);">Modifica los datos del huésped y la estancia</small>
            </div>
            <button class="hostal-modal-close" onclick="cerrarHostalModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form hx-post="{% url 'hostal:actualizar_reserva' reserva.id %}" hx-target="#hostal-modal-container">
            {% csrf_token %}
            <div class="hostal-modal-body" style="padding: 25px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                    
                    <!-- Huésped -->
                    <div style="grid-column: span 2;">
                        <p class="section-title"><i class="fas fa-user-circle"></i> Información del Huésped</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                            <div class="hm-field">
                                <label class="hm-label">Nombre Completo</label>
                                <input type="text" name="nombre_completo" class="hm-input" value="{{ reserva.huesped.nombre_completo }}" required>
                            </div>
                            <div class="hm-field">
                                <label class="hm-label">Documento / ID</label>
                                <input type="text" name="documento" class="hm-input" value="{{ reserva.huesped.documento_identidad|default:"" }}" required>
                            </div>
                            <div class="hm-field">
                                <label class="hm-label">Email</label>
                                <input type="email" name="email" class="hm-input" value="{{ reserva.huesped.email|default:"" }}">
                            </div>
                            <div class="hm-field">
                                <label class="hm-label">Teléfono</label>
                                <input type="text" name="telefono" class="hm-input" value="{{ reserva.huesped.telefono|default:"" }}">
                            </div>
                        </div>
                    </div>

                    <hr style="grid-column: span 2; margin: 5px 0; border: none; border-top: 1px solid var(--bg-cream); opacity: 0.5;">

                    <!-- Estadía -->
                    <div style="grid-column: span 2;">
                        <p class="section-title"><i class="fas fa-calendar-alt"></i> Detalles de la Estancia</p>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;">
                            <div class="hm-field">
                                <label class="hm-label">Check-In</label>
                                <input type="date" name="fecha_checkin" class="hm-input" value="{{ reserva.fecha_checkin|date:'Y-m-d' }}" required>
                            </div>
                            <div class="hm-field">
                                <label class="hm-label">Check-Out</label>
                                <input type="date" name="fecha_checkout" class="hm-input" value="{{ reserva.fecha_checkout|date:'Y-m-d' }}" required>
                            </div>
                            <div class="hm-field">
                                <label class="hm-label">Huéspedes</label>
                                <input type="number" name="cantidad_personas" id="edit_personas" class="hm-input" value="{{ reserva.cantidad_personas }}" required min="1">
                            </div>
                            <div class="hm-field">
                                <label class="hm-label">Estado</label>
                                <select name="estado" class="hm-input" style="width: 100%;">
                                    <option value="pendiente" {% if reserva.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
                                    <option value="checkin" {% if reserva.estado == 'checkin' %}selected{% endif %}>Hospedado</option>
                                    <option value="checkout" {% if reserva.estado == 'checkout' %}selected{% endif %}>Check-Out</option>
                                    <option value="cancelada" {% if reserva.estado == 'cancelada' %}selected{% endif %}>Cancelada</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Económico -->
                    <div style="grid-column: span 2;">
                        <p class="section-title"><i class="fas fa-money-bill-wave"></i> Montos Finales ($)</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                            <div class="hm-field">
                                <label class="hm-label">Precio Total Transacción</label>
                                <input type="number" step="0.01" name="precio_total" id="edit_precio_total" class="hm-input" value="{{ reserva.precio_total|floatformat:2 }}" required>
                                <small style="display: block; margin-top: 4px; color: var(--text-light); font-size: 0.75rem;">Sugerido p/p: <span id="sugerido_val">{{ precio_actual }}</span></small>
                            </div>
                            <div class="hm-field">
                                <label class="hm-label">Monto Abonado / Pagado</label>
                                <input type="number" step="0.01" name="pagado" id="edit_pagado" class="hm-input" value="{{ reserva.pagado|floatformat:2 }}">
                            </div>
                        </div>
                        <div class="hm-field">
                            <label class="hm-label">Observaciones</label>
                            <textarea name="observaciones" class="hm-input" rows="2">{{ reserva.observaciones|default:"" }}</textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hostal-modal-footer" style="padding: 20px; background: #fdfdfb; border-radius: 0 0 24px 24px; gap: 12px; justify-content: flex-end;">
                <button type="button" class="btn-hm-cancel" onclick="cerrarHostalModal()" style="margin: 0; padding: 12px 25px;">Cerrar</button>
                <button type="submit" class="btn-hm-save" style="background: #3b82f6; margin: 0; padding: 12px 30px; font-weight: 800;">
                    <i class="fas fa-save me-2"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    (function() {
        const inputPersonas = document.getElementById('edit_personas');
        const inputTotal = document.getElementById('edit_precio_total');
        const inputPagado = document.getElementById('edit_pagado');
        const precioPersona = parseFloat(document.getElementById('sugerido_val').textContent);

        function updateTotals() {
            const cant = parseInt(inputPersonas.value) || 0;
            if (cant > 0) {
                const total = (cant * precioPersona).toFixed(2);
                inputTotal.value = total;
                inputPagado.value = total; // Sync pagado with total
            }
        }

        inputPersonas.addEventListener('input', updateTotals);
        
        inputTotal.addEventListener('input', function() {
            inputPagado.value = this.value; // Sync if manually changed
        });
    })();
</script>

<style>
    .section-title { font-size: 0.72rem; font-weight: 800; color: var(--secondary-color); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .hm-field { margin-bottom: 5px; }
    .hm-input { width: 100%; box-sizing: border-box; }
</style>
