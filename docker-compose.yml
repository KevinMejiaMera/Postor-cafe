services:
  # ─────────────────────────────────────
  # BASE DE DATOS
  # ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: postor-db
    restart: unless-stopped
    volumes:
      - postor_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:                ${DB_NAME}
      POSTGRES_USER:              ${DB_USER}
      POSTGRES_PASSWORD:          ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD:  md5
    expose:
      - "5432"
    networks:
      - red_interna
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ─────────────────────────────────────
  # APLICACIÓN DJANGO
  # ─────────────────────────────────────
  app:
    build: .
    container_name: postor-app
    restart: unless-stopped
    command: >-
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      exec gunicorn
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --worker-tmp-dir /dev/shm
      --access-logfile -
      --error-logfile -
      restaurante.wsgi:application"
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
      - postor_static_volume:/app/staticfiles
      - postor_media_volume:/app/media
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DB_HOST=postor-db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - red_interna
      - proxy-network
      - general-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # ─────────────────────────────────────
  # PROXY NGINX
  # ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: postor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - postor_media_volume:/app/media:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - red_interna
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
# ─────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────
networks:
  red_interna:
    driver: bridge
  proxy-network:
    external: true
    name: proxy-network
  general-net:
    external: true
    name: general-net

# ─────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────
volumes:
  postor_db_data:
    name: postor_cafe_db_data
    driver: local
  postor_static_volume:
    name: postor_cafe_static
    driver: local
  postor_media_volume:
    name: postor_cafe_media
    driver: local
